name: card_scanner_app
description: A simple Flutter app that scans a credit/debit card with the camera
  and reads its 16-digit number, expiry date and holder name.

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.0
  permission_handler: ^12.0.3
  local_auth: null

  csv: ^8.0.0
  excel: ^4.0.6
  file_picker: ^11.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
