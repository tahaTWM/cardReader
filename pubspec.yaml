name: card_scanner_app
description: A simple Flutter app that scans a credit/debit card with the camera
  and reads its 16-digit number, expiry date and holder name.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: "^3.12.0"

dependencies:
  camera: ^0.12.0+1
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  google_mlkit_text_recognition: ^0.15.0
  local_auth: ^3.0.1
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
